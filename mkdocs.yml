site_name: 2p_imaging
site_description: Documentation for the Najafi Lab 2p imaging analysis repository
site_url: !ENV [SITE_URL, '']
repo_url: https://github.com/najafi-laboratory/2p_imaging
repo_name: najafi-laboratory/2p_imaging

theme:
  name: readthedocs

markdown_extensions:
