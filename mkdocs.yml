              - Required folder structure: manual-roi-workflow.md#required-folder-structure
              - Create Suite2p GUI compatible directory: manual-roi-workflow.md#create-suite2p-gui-compatible-directory
              - Required data.bin: manual-roi-workflow.md#required-databin
              - Build data.bin from TIFFs only: manual-roi-workflow.md#build-databin-from-tiffs-only
          - "Step 2: Add Manual ROIs in Suite2p GUI":
              - "Step 2 overview": manual-roi-workflow.md#step-2-add-manual-rois-in-suite2p-gui
              - Repository and helper access: manual-roi-workflow.md#repository-and-helper-access
              - Start the interactive desktop: manual-roi-workflow.md#start-the-interactive-desktop
              - Launch the patched Suite2p GUI: manual-roi-workflow.md#launch-the-patched-suite2p-gui
              - Add the ROI in the GUI: manual-roi-workflow.md#add-the-roi-in-the-gui
              - Export a temporary workspace back to QC names: manual-roi-workflow.md#export-a-temporary-workspace-back-to-qc-names
      - Interactive ROI Labeling: roi-reviewer-exports.md
  - Experiments and Analyses:
