site_name: 2p_imaging
site_description: Documentation for the Najafi Lab 2p imaging analysis repository
site_url: !ENV [SITE_URL, '']
repo_url: https://github.com/najafi-laboratory/2p_imaging
repo_name: najafi-laboratory/2p_imaging

theme:
  name: readthedocs

markdown_extensions:
  - admonition
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - 2p Data Preparation Workflow:
      - Overview: workflow.md
      - Processing Quickstart: processing-quickstart.md
      - Preprocessing: preprocessing.md
      - Postprocessing: postprocessing.md
      - Adding Manual ROIs:
          - Overview: manual-roi-workflow.md
          - "Step 1: Prepare Suite2p-compatible inputs": manual-roi-prepare.md
          - "Step 2: Add Manual ROIs in Suite2p GUI": manual-roi-gui.md
      - Interactive ROI Labeling: roi-reviewer-exports.md
  - Experiments and Analyses:
      - Passive: passive.md
      - 2AFC: twoafc.md
      - Closed Loop: closed-loop.md
      - Joystick: joystick.md
      - EBC: ebc.md
